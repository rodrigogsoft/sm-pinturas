# =============================================================
# SM Pinturas & Construcoes
# Docker Compose — Producao / VPS
#
# Uso:
#   Subir PRODUCAO:    docker compose -f docker-compose.prod.yml --profile producao up -d --build
#   Subir HOMOLOGACAO: docker compose -f docker-compose.prod.yml --profile homol up -d --build
#   Subir AMBOS:       docker compose -f docker-compose.prod.yml --profile producao --profile homol up -d --build
#   Derrubar tudo:     docker compose -f docker-compose.prod.yml down
# =============================================================

services:

  # ─────────────────────────────────────────────
  # Infraestrutura compartilhada (sem profile)
  # ─────────────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    container_name: sm_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh:ro
    networks:
      - sm_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sm_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - sm_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # PRODUCAO
  # ─────────────────────────────────────────────

  backend-prod:
    profiles: [producao]
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    image: sm_pinturas_backend:prod
    container_name: sm_api_prod
    restart: unless-stopped
    ports:
      - "3006:3000"
    env_file: ./backend/.env.production
    environment:
      DATABASE_HOST: postgres
      DATABASE_NAME: sm_pinturas_prod
      REDIS_HOST: redis
      REDIS_DB: "0"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sm_network

  frontend-prod:
    profiles: [producao]
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_URL: /api/v1
        VITE_ENV: production
        VITE_APP_NAME: SM Pinturas ERP
        BACKEND_HOST: backend-prod
    image: sm_pinturas_frontend:prod
    container_name: sm_web_prod
    restart: unless-stopped
    ports:
      - "3010:80"
    depends_on:
      - backend-prod
    networks:
      - sm_network

  # ─────────────────────────────────────────────
  # HOMOLOGACAO
  # ─────────────────────────────────────────────

  backend-homol:
    profiles: [homol]
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    image: sm_pinturas_backend:homol
    container_name: sm_api_homol
    restart: unless-stopped
    ports:
      - "3007:3000"
    env_file: ./backend/.env.homol
    environment:
      DATABASE_HOST: postgres
      DATABASE_NAME: sm_pinturas_homol
      REDIS_HOST: redis
      REDIS_DB: "1"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sm_network

  frontend-homol:
    profiles: [homol]
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_URL: /api/v1
        VITE_ENV: staging
        VITE_APP_NAME: SM Pinturas ERP (Homol)
        BACKEND_HOST: backend-homol
    image: sm_pinturas_frontend:homol
    container_name: sm_web_homol
    restart: unless-stopped
    ports:
      - "3011:80"
    depends_on:
      - backend-homol
    networks:
      - sm_network

networks:
  sm_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
