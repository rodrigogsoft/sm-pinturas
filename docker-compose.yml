services:
  # Banco de Dados PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: jb_pinturas_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: jb_pinturas_db
      POSTGRES_USER: jb_admin
      POSTGRES_PASSWORD: jb_secure_pass_2026
      PGDATA: /var/lib/postgresql/data/pgdata
      POSTGRES_INITDB_ARGS: "-E UTF8"
      LC_ALL: C.UTF-8
      LANG: C.UTF-8
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - jb_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jb_admin -d jb_pinturas_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis para Cache e Jobs
  redis:
    image: redis:7-alpine
    container_name: jb_pinturas_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass redis_jb_2026
    volumes:
      - redis_data:/data
    networks:
      - jb_network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API (NestJS)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: jb_pinturas_api
    restart: unless-stopped
    ports:
      - "3005:3000"
    environment:
      NODE_ENV: development
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: jb_admin
      DATABASE_PASSWORD: jb_secure_pass_2026
      DATABASE_NAME: jb_pinturas_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: redis_jb_2026
      JWT_SECRET: jwt_secret_key_change_in_production
      JWT_EXPIRES_IN: 7d
      PORT: 3000
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - jb_network
    command: npm run start:dev

  # Frontend Web (React)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: jb_pinturas_web
    restart: unless-stopped
    ports:
      - "3010:3010"
    environment:
      VITE_ENV: development
      VITE_PROXY_TARGET: http://backend:3000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - jb_network
    command: sh -c "npm install; npm run dev -- --host 0.0.0.0"

  # Adminer - Interface Web para PostgreSQL
  adminer:
    image: adminer:latest
    container_name: jb_pinturas_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: nette
    depends_on:
      - postgres
    networks:
      - jb_network

  # Redis Commander - Interface Web para Redis
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: jb_pinturas_redis_commander
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      REDIS_HOSTS: local:redis:6379:0:redis_jb_2026
    depends_on:
      - redis
    networks:
      - jb_network

networks:
  jb_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
