version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: jb_pinturas_db
    environment:
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      POSTGRES_DB: ${DATABASE_NAME:-jb_pinturas}
      TZ: America/Sao_Paulo
    ports:
      - "${DATABASE_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - jb_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache (optional)
  redis:
    image: redis:7-alpine
    container_name: jb_pinturas_cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - jb_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jb_pinturas_api
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      API_PORT: ${API_PORT:-3001}
      API_URL: ${API_URL:-http://localhost:3001}
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: ${DATABASE_USER:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      DATABASE_NAME: ${DATABASE_NAME:-jb_pinturas}
      DATABASE_URL: postgresql://${DATABASE_USER:-postgres}:${DATABASE_PASSWORD:-postgres}@postgres:5432/${DATABASE_NAME:-jb_pinturas}
      JWT_SECRET: ${JWT_SECRET:-your_secret_key_change_in_production}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-24h}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    ports:
      - "${API_PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - jb_network
    command: npm run start:dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Frontend React
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: jb_pinturas_web
    environment:
      REACT_APP_API_URL: http://localhost:3001
      REACT_APP_ENV: ${NODE_ENV:-development}
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - jb_network
    command: npm start

  # Adminer - Database Management UI
  adminer:
    image: adminer
    container_name: jb_pinturas_adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - jb_network
    environment:
      ADMINER_DEFAULT_SERVER: postgres

  # pgAdmin - Advanced PostgreSQL Management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: jb_pinturas_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@jbpinturas.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: 'False'
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - jb_network
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  jb_network:
    driver: bridge
