# =============================================================
# SM Pinturas & Construções — Nginx
# Proxy reverso para produção e homologação na mesma VPS
#
# Instalação:
#   sudo cp smpinturas.conf /etc/nginx/sites-available/smpinturas
#   sudo ln -s /etc/nginx/sites-available/smpinturas /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL (Certbot):
#   sudo certbot --nginx -d app.smpinturas.com.br -d homol.smpinturas.com.br -d api.smpinturas.com.br -d api-homol.smpinturas.com.br
# =============================================================

# ─────────────────────────────
# PRODUÇÃO — Frontend
# ─────────────────────────────
server {
    listen 80;
    server_name app.smpinturas.com.br;

    # Redireciona HTTP → HTTPS (após certbot preenche automaticamente)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name app.smpinturas.com.br;

    # Certificados (preenchidos pelo Certbot)
    ssl_certificate     /etc/letsencrypt/live/app.smpinturas.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.smpinturas.com.br/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Segurança
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Limites
    client_max_body_size 10M;

    # Frontend React (build estático servido pelo container)
    location / {
        proxy_pass         http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Suporte a rotas SPA (React Router)
        try_files $uri $uri/ @frontend_prod;
    }

    location @frontend_prod {
        proxy_pass http://127.0.0.1:3010;
    }

    # API Backend
    location /api/ {
        proxy_pass         http://127.0.0.1:3006;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Swagger (apenas em prod — pode bloquear se quiser)
    location /api/docs {
        proxy_pass http://127.0.0.1:3006;
        proxy_set_header Host $host;
    }

    # Healthcheck
    location /health {
        proxy_pass http://127.0.0.1:3006/api/v1/health;
    }
}

# ─────────────────────────────
# HOMOLOGAÇÃO — Frontend
# ─────────────────────────────
server {
    listen 80;
    server_name homol.smpinturas.com.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name homol.smpinturas.com.br;

    ssl_certificate     /etc/letsencrypt/live/homol.smpinturas.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/homol.smpinturas.com.br/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;

    # Proteger acesso ao ambiente de homol (opcional: Basic Auth)
    # auth_basic "Ambiente Restrito";
    # auth_basic_user_file /etc/nginx/.htpasswd;

    client_max_body_size 10M;

    location / {
        proxy_pass         http://127.0.0.1:3011;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        try_files $uri $uri/ @frontend_homol;
    }

    location @frontend_homol {
        proxy_pass http://127.0.0.1:3011;
    }

    location /api/ {
        proxy_pass         http://127.0.0.1:3007;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Swagger sempre disponível em homol
    location /api/docs {
        proxy_pass http://127.0.0.1:3007;
        proxy_set_header Host $host;
    }
}
