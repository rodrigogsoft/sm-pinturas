<!DOCTYPE html>
<html>
<head>
    <title>Test Login - API Proxy</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        button { padding: 10px 20px; background: #1976d2; color: white; border: none; cursor: pointer; }
        .log { border: 1px solid #ccc; padding: 10px; margin-top: 20px; white-space: pre-wrap; background: #f5f5f5; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Test Login - Check API Proxy</h1>
        <button onclick="testDirectAPI()">Test Direct API (http://localhost:3000)</button>
        <button onclick="testProxyAPI()">Test Via Proxy (/api/v1)</button>
        <button onclick="testActualLogin()">Test Actual Login Form</button>
        <div id="log" class="log"></div>
    </div>

    <script>
        const log = document.getElementById('log');
        let logText = '';

        function writeLog(msg, isError = false) {
            const className = isError ? 'error' : 'success';
            logText += `<span class="${className}">${new Date().toLocaleTimeString()}: ${msg}</span>\n`;
            log.innerHTML = logText.replace(/</g, '&lt;').replace(/>/g, '&gt;');
            window.scrollTo(0, document.body.scrollHeight);
        }

        async function makeLoginRequest(baseURL, description) {
            logText = '';
            writeLog(`Testing ${description}...`);
            
            try {
                const response = await fetch(baseURL + '/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: 'admin@jbpinturas.com.br',
                        password: 'Admin@2026'
                    })
                });

                writeLog(`Response Status: ${response.status}`);

                if (!response.ok) {
                    const error = await response.text();
                    writeLog(`Error: ${error}`, true);
                    return;
                }

                const data = await response.json();
                
                if (data.access_token) {
                    writeLog(`✓ Success! Got access_token`, false);
                    writeLog(`User: ${data.user?.email}`);
                    writeLog(`Token: ${data.access_token.substring(0, 50)}...`);
                } else {
                    writeLog(`✗ No access_token in response`, true);
                    writeLog(`Response: ${JSON.stringify(data)}`);
                }
            } catch (error) {
                writeLog(`✗ Error: ${error.message}`, true);
            }
        }

        function testDirectAPI() {
            makeLoginRequest('http://localhost:3000/api/v1', 'Direct API');
        }

        function testProxyAPI() {
            makeLoginRequest('/api/v1', 'Via Proxy');
        }

        function testActualLogin() {
            logText = '';
            writeLog('Loading login form...');
            
            // Simulate what the React login form does
            fetch('/login')
                .then(r => r.text())
                .then(html => {
                    writeLog('Login page loaded');
                    writeLog('Now testing actual login via fetch...');
                    
                    // Make the actual login request
                    return fetch('/api/v1/auth/login', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            email: 'admin@jbpinturas.com.br',
                            password: 'Admin@2026'
                        })
                    });
                })
                .then(r => {
                    writeLog(`Response Status: ${r.status}`);
                    return r.json();
                })
                .then(data => {
                    if (data.access_token) {
                        writeLog(`✓ Login successful!`);
                        writeLog(`Redirecting to dashboard...`);
                        // Actually redirect
                        //window.location.href = '/dashboard';
                    } else {
                        writeLog(`No access_token`, true);
                    }
                })
                .catch(err => writeLog(`Error: ${err.message}`, true));
        }
    </script>
</body>
</html>
